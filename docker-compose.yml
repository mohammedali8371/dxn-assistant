version: '3.8'

services:
  dxn-bot:
    build: .
    container_name: dxn-assistant
    restart: unless-stopped
    env_file: .env
    ports:
      - "3004:3004"
    volumes:
      - ./knowledge:/app/knowledge
      - ./media:/app/media
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

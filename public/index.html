<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم مساعد DXN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00f260, #0575e6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #a0aec0; margin-top: 10px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card .icon { font-size: 2rem; margin-bottom: 10px; }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: #00f260; }
        .stat-card .label { color: #a0aec0; margin-top: 5px; }
        .status-section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
        }
        .status-section h2 { margin-bottom: 20px; color: #00f260; }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: rgba(0,242,96,0.2);
            color: #00f260;
        }
        .btn {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            background: linear-gradient(90deg, #00f260, #0575e6);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .last-update { text-align: center; color: #718096; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 مساعد DXN الذكي</h1>
            <p>لوحة مراقبة وإدارة المساعد</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">👥</div>
                <div class="value" id="totalUsers">--</div>
                <div class="label">إجمالي المستخدمين</div>
            </div>
            <div class="stat-card">
                <div class="icon">💬</div>
                <div class="value" id="todayMessages">--</div>
                <div class="label">رسائل اليوم</div>
            </div>
            <div class="stat-card">
                <div class="icon">⚠️</div>
                <div class="value" id="todayErrors">--</div>
                <div class="label">أخطاء اليوم</div>
            </div>
            <div class="stat-card">
                <div class="icon">📊</div>
                <div class="value" id="totalConversations">--</div>
                <div class="label">إجمالي المحادثات</div>
            </div>
            <div class="stat-card">
                <div class="icon">📚</div>
                <div class="value" id="totalKnowledge">--</div>
                <div class="label">ملفات المعرفة</div>
            </div>
        </div>

        <div class="status-section">
            <h2>📋 حالة النظام</h2>
            <div class="status-item">
                <span>حالة الخادم</span>
                <span class="status-badge" id="serverStatus">--</span>
            </div>
            <div class="status-item">
                <span>وقت التشغيل</span>
                <span id="uptime">--</span>
            </div>
            <div class="status-item">
                <span>استهلاك الذاكرة</span>
                <span id="memory">--</span>
            </div>
            <div class="status-item">
                <span>مزود الذكاء</span>
                <span id="aiProvider">--</span>
            </div>
            <div class="status-item">
                <span>قاعدة البيانات</span>
                <span class="status-badge">متصل</span>
            </div>
        </div>

        <button class="btn" onclick="rebuildKnowledge()">🔄 إعادة بناء المعرفة</button>
        <button class="btn" onclick="loadData()">🔄 تحديث البيانات</button>
        <div class="last-update">آخر تحديث: <span id="lastUpdate">--</span></div>
    </div>

    <script>
        async function loadData() {
            try {
                const statsRes = await fetch('/api/stats');
                const statsData = await statsRes.json();
                if (statsData.success) {
                    document.getElementById('totalUsers').textContent = statsData.data.totalUsers || 0;
                    document.getElementById('todayMessages').textContent = statsData.data.todayMessages || 0;
                    document.getElementById('todayErrors').textContent = statsData.data.todayErrors || 0;
                    document.getElementById('totalConversations').textContent = statsData.data.totalConversations || 0;
                    document.getElementById('totalKnowledge').textContent = statsData.data.totalKnowledge || 0;
                }

                const healthRes = await fetch('/api/health');
                const healthData = await healthRes.json();
                if (healthData.success) {
                    document.getElementById('serverStatus').textContent = 'يعمل';
                    document.getElementById('uptime').textContent = formatUptime(healthData.data.uptime);
                    document.getElementById('memory').textContent = formatMemory(healthData.data.memory);
                }

                const assistantRes = await fetch('/api/assistant');
                const assistantData = await assistantRes.json();
                if (assistantData.success) {
                    document.getElementById('aiProvider').textContent = assistantData.data.provider;
                }

                document.getElementById('lastUpdate').textContent = new Date().toLocaleString('ar-SA');
            } catch (error) {
                document.getElementById('serverStatus').textContent = 'متوقف';
                console.error('خطأ:', error);
            }
        }

        async function rebuildKnowledge() {
            try {
                await fetch('/api/rebuild', { method: 'POST' });
                alert('تم إعادة بناء قاعدة المعرفة!');
                loadData();
            } catch (error) {
                alert('حدث خطأ!');
            }
        }

        function formatUptime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            return `${hrs} ساعة ${mins} دقيقة`;
        }

        function formatMemory(mem) {
            return `${(mem.rss / 1024 / 1024).toFixed(1)} MB`;
        }

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
